<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>To-Do Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>To-Do Board</h1>

    <div class="controls">
        <input type="text" id="taskInput" placeholder="Enter task">
        <button id="addBtn">Add</button>
    </div>

    <div class="board">

        <div class="column" id="current">
            <h2>Current</h2>
        </div>

        <div class="column" id="future">
            <h2>Future</h2>
        </div>

        <div class="column" id="done">
            <h2>Done</h2>
        </div>

    </div>

    <script src="index.js"></script>
</body>
</html>
